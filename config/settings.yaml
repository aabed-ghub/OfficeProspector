# Office Prospector Configuration

# IRS FOIA data URLs (updated Jan + Jul each year)
irs:
  master_url: "https://www.irs.gov/pub/foia/FOIA-MASTER-DT2025-12-05.zip"
  partner_url: "https://www.irs.gov/pub/foia/FOIA-PARTNR-DT2025-12-05.zip"
  contact_url: "https://www.irs.gov/pub/foia/FOIA-CONTCT-DT2025-12-05.zip"
  ptin_base_url: "https://www.irs.gov/pub/foia/"

# Filtering thresholds
filter:
  min_returns: 100
  max_returns: 15000
  fuzzy_match_threshold: 80  # 0-100, for chain name matching

# Enrichment settings
enrich:
  # Website scraping - basic pages to check
  scrape_pages:
    - "/"
    - "/about"
    - "/about-us"
    - "/team"
    - "/our-team"
    - "/staff"
    - "/contact"
    - "/contact-us"
  scrape_timeout_seconds: 10
  scrape_max_concurrent: 5

  # Apollo.io
  apollo_enabled: true
  apollo_titles:
    - "owner"
    - "managing partner"
    - "partner"
    - "director"
    - "president"
    - "ceo"
    - "principal"
    - "founder"

  # Email verification
  email_verify_smtp: true
  email_verify_mx: true
  email_patterns:
    - "{first}.{last}"
    - "{first}{last}"
    - "{f}{last}"
    - "{first}"
    - "{last}"

# Export settings
export:
  csv_dir: "data/processed"
  json_dir: "docs/site"
  json_filename: "firms.json"

