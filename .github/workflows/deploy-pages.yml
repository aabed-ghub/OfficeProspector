name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/site/**"

  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firms.json from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading firms.json from latest release..."
          gh release download --pattern "firms.json" --dir docs/site --clobber || {
            echo "WARNING: No firms.json found in any release. Dashboard will load without data."
            echo "To fix: create a release and upload firms.json as an asset."
          }
          ls -lh docs/site/firms.json 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
